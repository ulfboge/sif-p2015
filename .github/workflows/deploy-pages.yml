name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Firebase config from secret
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
        run: |
          if [ -z "$FIREBASE_API_KEY" ]; then
            echo "Missing FIREBASE_API_KEY secret in repository settings."
            exit 1
          fi

          cat > firebase-config.js <<EOF
          window.__FIREBASE_CONFIG__ = {
            apiKey: "${FIREBASE_API_KEY}",
            authDomain: "sif-p2015.firebaseapp.com",
            projectId: "sif-p2015",
            storageBucket: "sif-p2015.firebasestorage.app",
            messagingSenderId: "60313731987",
            appId: "1:60313731987:web:43fe0234b05eeee6381e66"
          };
          EOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
